<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Password Generator</title>
</head>

<body>
    
        <div class="container">
            <h2> Grenerate a Random Password</h2>
            <div class="result_container">
                <span class="result"></span>
                <button class="btn" id="clipboard"> copt to clipboard</button>
            </div>

            <div class="settings">

                <div class="settings">
                    <label> Password Length</label>
                    <input type="number" id="length" min="7" max="15" value="15" />
                </div>


                <div class="settings">
                    <label> Include Uppercase</label>
                    <input type="checkbox" id="uppercase" checked />
                </div>

                <div class="settings">
                    <label> Include Lowercase</label>
                    <input type="checkbox" id="lowercase" checked />
                </div>

                <div class="settings">
                    <label> Include Numbers</label>
                    <input type="checkbox" id="number" checked />
                </div>

                <div class="settings">
                    <label> Include Symbols</label>
                    <input type="checkbox" id="symbol" checked />
                </div>

            </div>


            <button class="btn btn-large"></button>




        </div>
    
</body>

</html>
